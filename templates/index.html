<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIS Yakiniku Inventory - Prediksi Pembelian Barang</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .input-info {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .result {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
            display: none;
        }

        .result.show {
            display: block;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-item {
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #e0e0e0;
        }

        .result-item:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .result-label {
            color: #666;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 5px;
        }

        .result-value {
            color: #333;
            font-size: 20px;
            font-weight: 700;
        }

        .result-value.highlight {
            color: #667eea;
        }

        .error {
            color: #e74c3c;
            padding: 12px;
            background: #fadbd8;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }

        .error.show {
            display: block;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍖 FIS Yakiniku</h1>
        <p class="subtitle">Sistem Prediksi Pembelian Barang</p>

        <form id="predictionForm">
            <div class="form-group">
                <label for="inventory">Jumlah Persediaan (Inventory)</label>
                <input type="number" id="inventory" min="0" max="500" step="1" placeholder="0 - 500" required>
                <div class="input-info">Range: 0 - 500 unit</div>
            </div>

            <div class="form-group">
                <label for="sales">Jumlah Penjualan (Sales)</label>
                <input type="number" id="sales" min="0" max="50" step="0.1" placeholder="0 - 50" required>
                <div class="input-info">Range: 0 - 50 unit</div>
            </div>

            <button type="submit">Prediksi Pembelian</button>
        </form>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Sedang memproses...</p>
        </div>

        <div class="error" id="error"></div>

        <div class="result" id="result">
            <div class="result-item">
                <div class="result-label">Persediaan</div>
                <div class="result-value"><span id="resultInventory">-</span> unit</div>
            </div>
            <div class="result-item">
                <div class="result-label">Penjualan</div>
                <div class="result-value"><span id="resultSales">-</span> unit</div>
            </div>
            <div class="result-item">
                <div class="result-label">Rekomendasi Pembelian</div>
                <div class="result-value highlight"><span id="resultPurchase">-</span> unit</div>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('predictionForm');
        const loading = document.getElementById('loading');
        const error = document.getElementById('error');
        const result = document.getElementById('result');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            // Get input values
            const inventory = document.getElementById('inventory').value;
            const sales = document.getElementById('sales').value;

            // Clear previous results
            error.classList.remove('show');
            result.classList.remove('show');

            // Show loading
            loading.classList.add('show');

            try {
                // Send request to backend
                const response = await fetch('/api/predict', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        inventory: parseFloat(inventory),
                        sales: parseFloat(sales)
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Terjadi kesalahan');
                }

                // Display results
                document.getElementById('resultInventory').textContent = data.inventory;
                document.getElementById('resultSales').textContent = data.sales;
                document.getElementById('resultPurchase').textContent = data.purchase_quantity;

                loading.classList.remove('show');
                result.classList.add('show');

            } catch (err) {
                loading.classList.remove('show');
                error.classList.add('show');
                error.textContent = '❌ Error: ' + err.message;
            }
        });
    </script>
</body>
</html>
